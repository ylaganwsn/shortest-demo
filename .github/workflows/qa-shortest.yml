name: QA - Shortest
on:
  workflow_dispatch:
    inputs:
      base-url:
        description: 'URL to test'
        required: false
        default: 'https://example.com'
        type: string
jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # - name: Check installed versions
      #   run: |
      #     cat node_modules/@antiwork/shortest/package.json | grep '"version"'
      #     cat node_modules/playwright/package.json | grep '"version"'

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      # - name: Debug connectivity
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #   run: |
      #     echo "Key length: ${#ANTHROPIC_API_KEY}"
      #     echo "Key prefix: ${ANTHROPIC_API_KEY:0:7}"

      - name: Run Shortest tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.BEDROCK_API_KEY }}
          ANTHROPIC_BASE_URL: https://bedrock-mantle.us-east-1.api.aws/anthropic
          BASE_URL: ${{ github.event.inputs.base-url }}
        run: npx shortest
