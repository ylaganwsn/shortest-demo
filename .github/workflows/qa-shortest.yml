name: QA - Shortest
on:
  workflow_dispatch:
    inputs:
      base-url:
        description: 'URL to test'
        required: false
        default: 'https://example.com'
        type: string
jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Start LiteLLM proxy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          pip install 'litellm[proxy]' --break-system-packages -q
          litellm --model bedrock/us.anthropic.claude-3-5-haiku-20241022-v1:0 --port 4000 &
          sleep 8
          
      - name: Debug proxy
        run: |
          curl -s -X POST http://localhost:4000/v1/messages \
            -H "Content-Type: application/json" \
            -H "x-api-key: dummy-key" \
            -d '{"model":"claude-3-5-sonnet-20241022","max_tokens":10,"messages":[{"role":"user","content":"hi"}]}' \
            | jq .

      - name: Run Shortest tests
        env:
          ANTHROPIC_API_KEY: dummy-key
          ANTHROPIC_BASE_URL: http://localhost:4000
          BASE_URL: ${{ github.event.inputs.base-url }}
        run: npx shortest
